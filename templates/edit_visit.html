{% extends "base.html" %}

{% block content %}
<h2 class="mb-4">Edit Visit: {{ visit.client_name }}</h2>

<div class="card shadow-sm">
    <div class="card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Client Name *</label>
                    <input type="text" class="form-control" name="client_name" value="{{ visit.client_name }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Company Name *</label>
                    <input type="text" class="form-control" name="company_name" value="{{ visit.company_name }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Contact Number *</label>
                    <input type="text" class="form-control" name="contact_number" value="{{ visit.contact_number }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Location *</label>
                    <input type="text" class="form-control" name="location" value="{{ visit.location }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Visit Date</label>
                    <input type="date" class="form-control" name="visit_date" value="{{ visit.visit_date.strftime('%Y-%m-%d') }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Status</label>
                    <select class="form-select" name="status">
                        <option value="Pending" {% if visit.status == 'Pending' %}selected{% endif %}>Pending</option>
                        <option value="Completed" {% if visit.status == 'Completed' %}selected{% endif %}>Completed</option>
                        <option value="Cancelled" {% if visit.status == 'Cancelled' %}selected{% endif %}>Cancelled</option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">Purpose *</label>
                    <input type="text" class="form-control" name="purpose" value="{{ visit.purpose }}" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Meeting Notes</label>
                    <textarea class="form-control" name="meeting_notes" rows="4">{{ visit.meeting_notes }}</textarea>
                </div>
                <div class="col-12 mt-4">
                    <button type="submit" class="btn btn-primary">Update Visit</button>
                    <a href="{{ url_for('admin_visits') if current_user.role == 'admin' else url_for('visits') }}" class="btn btn-secondary">Cancel</a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
